services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: bookstore-postgres
    environment:
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore123
      POSTGRES_DB: bookstore_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookstore -d bookstore_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go 应用
  app:
    build: .
    container_name: bookstore-app
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=debug
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
