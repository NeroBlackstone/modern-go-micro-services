services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:18-alpine
    container_name: bookstore-postgres
    environment:
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore123
      POSTGRES_DB: bookstore_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookstore -d bookstore_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:8-alpine
    container_name: bookstore-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go 应用
  app:
    build: .
    container_name: bookstore-app
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
