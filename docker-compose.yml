services:
  # ==================== 基础设施服务 ====================

  # PostgreSQL - 用户数据库
  postgres-user:
    image: postgres:18-alpine
    container_name: bookstore-postgres-user
    environment:
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore123
      POSTGRES_DB: user_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookstore -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL - 图书数据库
  postgres-book:
    image: postgres:18-alpine
    container_name: bookstore-postgres-book
    environment:
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore123
      POSTGRES_DB: book_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_book_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookstore -d book_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL - 订单数据库
  postgres-order:
    image: postgres:18-alpine
    container_name: bookstore-postgres-order
    environment:
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore123
      POSTGRES_DB: order_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_order_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookstore -d order_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:8-alpine
    container_name: bookstore-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: bookstore-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Consul 服务发现
  consul:
    image: hashicorp/consul:2.0.1
    container_name: bookstore-consul
    ports:
      - "8500:8500" # Web UI + HTTP API
      - "8600:8600/udp" # DNS
    command: agent -dev -client=0.0.0.0
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== 微服务 ====================

  # 用户服务 (gRPC :9091 + HTTP :8081)
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: user-service
    container_name: bookstore-user-service
    ports:
      - "9091:9091" # gRPC
      - "8081:8081" # HTTP (register/login/profile)
    environment:
      - GIN_MODE=debug
    depends_on:
      postgres-user:
        condition: service_healthy
      consul:
        condition: service_healthy

  # 图书服务 (gRPC :9092)
  book-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: book-service
    container_name: bookstore-book-service
    ports:
      - "9092:9092" # gRPC
    environment:
      - GIN_MODE=debug
    depends_on:
      postgres-book:
        condition: service_healthy
      redis:
        condition: service_healthy
      consul:
        condition: service_healthy

  # 订单服务 (HTTP :8080)
  order-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: order-service
    container_name: bookstore-order-service
    ports:
      - "8080:8080" # HTTP API
    environment:
      - GIN_MODE=debug
    depends_on:
      postgres-order:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_healthy
      user-service:
        condition: service_started
      book-service:
        condition: service_started

volumes:
  postgres_user_data:
  postgres_book_data:
  postgres_order_data:
  redis_data:
  rabbitmq_data:
